[pytest]
# 真 pytest 測試都在 tests/；根目錄 test_*.py 是獨立腳本（自帶 __main__ runner，
# 用 python test_xxx.py 跑），不該被 pytest 收集。對齊 CI 的 `pytest tests/`。
testpaths = tests
norecursedirs = scratch venv_simon __pycache__ .git
markers =
    slow: 端到端真跡測試（碰 ffmpeg/Pillow 真 IO，較慢）
filterwarnings =
    ignore:'audioop' is deprecated and slated for removal in Python 3.13:DeprecationWarning:discord.player
